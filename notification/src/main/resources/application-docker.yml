server:
  port: 8090

spring:
  application:
    name: notification

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  rabbitmq:
    addresses: rabbitmq:5672
    username: user
    password: password
    virtual-host: /
  datasource:
    url: jdbc:postgresql://postgres:5432/notification
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc.time_zone: Asia/Yangon

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    enabled: false

management:
  tracing:
    sampling:
      probability: 1.0   # trace every request (dev)

rabbitmq:
  exchanges:
    internal: internal.exchange
  queues:
    notification: internal.queue
  routing-keys:
    internal-notification: internal.notification.routing-key
