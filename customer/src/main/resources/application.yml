server:
  port: 8080

spring:
  application:
    name: customer

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  rabbitmq:
    addresses: rabbitmq:5672
    username: user
    password: password
    virtual-host: /

  datasource:
    url: jdbc:postgresql://localhost:5432/customer
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc.time_zone: Asia/Yangon

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
    enabled: false


management:
  tracing:
    sampling:
      probability: 1.0   # trace every request (dev)