apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  labels:
    type: local
    app: postgres
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce   # Minikube + hostPath အတွက် safest
  hostPath:
    path: /mnt/data   # Minikube host path
  persistentVolumeReclaimPolicy: Retain

---

# -----------------------------
# 3️⃣ PersistentVolumeClaim
# -----------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  labels:
    app: postgres
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi